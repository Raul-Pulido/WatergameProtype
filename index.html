
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Drop Defender: Protect the Flow</title>
	<link rel="stylesheet" href="style.css">
	<!-- Proxima Nova is a commercial font. If you have a webfont kit, include it here. -->
	<!-- Example: <link rel="stylesheet" href="/fonts/proxima-nova.css"> -->
	<!-- If not available, system will fall back to Segoe UI or Arial. -->
</head>
<body>
	<!-- Large faint jerry can background for branding -->
	<div class="jerrycan-bg"></div>
	<!-- Decorative shapes for extra design -->
	<div class="decorative-shape top-left"></div>
	<div class="decorative-shape bottom-right"></div>
	<div class="decorative-shape top-right"></div>
	<div class="decorative-shape bottom-left"></div>
	<!-- Splash Screen -->
	<div id="splash-screen" class="splash-flex">
		<div id="splash-title-row">
			<img src="jerrycan.png" alt="charity: water jerry can" class="cw-jerrycan">
			<h1 style="font-size:2.5em; margin:0; display:inline-block; vertical-align:middle;">Drop Defender: Protect the Flow</h1>
	
	<!-- Footer -->
	<footer id="main-footer" style="width:100vw; background:#1565c0; color:#fff; text-align:center; padding:1.2em 0 1.2em 0; position:fixed; left:0; bottom:0; z-index:100; font-size:1.1em; box-shadow:0 -2px 12px rgba(0,0,0,0.08);">
		<!-- Milestone Toast Overlay -->
		<div id="milestone-toast" style="display:none; position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:#ffd600; color:#1565c0; font-size:1.25em; font-weight:bold; padding:1em 2em; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.13); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.5s, bottom 0.5s;"></div>
	  <span>Support clean water: </span>
	  <a href="https://charitywater.org" target="_blank" style="color:#ffd600; font-weight:bold; text-decoration:none; margin:0 0.7em;">charity: water</a>
	  <span>|</span>
	  <a href="https://www.charitywater.org/donate" target="_blank" style="color:#ffd600; font-weight:bold; text-decoration:none; margin:0 0.7em;">Donate</a>
	</footer>

		</div>
		<p class="mission" style="font-size:1.2em; margin-bottom:1em;">Protect clean water. Stop contamination. Help communities thrive.</p>
		<div id="level-info" style="font-size:1.1em; margin-bottom:1.2em; color:#ffd600; font-weight:bold;">Level 1: Light contamination</div>
		<div style="display:flex; flex-direction:column; gap:1em; justify-content:center; align-items:center; margin-top:1em;">
			<div style="position:relative;">
				<button id="choose-difficulty-btn" style="padding:0.7em 2em; font-size:1.1em; border:none; border-radius:8px; background:#00bcd4; color:#fff; cursor:pointer; transition:background 0.2s;">Choose Difficulty</button>
				<div id="difficulty-dropdown" style="position:absolute; left:0; top:110%; background:#fff; border:2px solid #ffd600; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.12); min-width:180px; z-index:10;">
					<button class="difficulty-option" data-difficulty="easy" style="width:100%; padding:0.7em 1.5em; font-size:1.05em; border:none; border-radius:8px 8px 0 0; background:#ffd600; color:#1565c0; cursor:pointer; font-weight:bold; text-align:left;">Easy</button>
					<button class="difficulty-option" data-difficulty="medium" style="width:100%; padding:0.7em 1.5em; font-size:1.05em; border:none; background:#00bcd4; color:#fff; cursor:pointer; font-weight:bold; text-align:left;">Normal</button>
					<button class="difficulty-option" data-difficulty="hard" style="width:100%; padding:0.7em 1.5em; font-size:1.05em; border:none; border-radius:0 0 8px 8px; background:#1565c0; color:#fff; cursor:pointer; font-weight:bold; text-align:left;">Hard</button>
				</div>
			</div>
		</div>
		<div style="margin-top:2em; font-size:0.95em; color:#e0f7fa; opacity:0.7;">A game by Raul Pulido</div>
	</div>

	<!-- Game UI -->
	<div id="game-ui" style="display:none;">
		<div id="main-row">
			<div id="side-right">
				<button id="pause-btn" style="padding:0.7em 1.5em; font-size:1.1em; border:none; border-radius:8px; background:#ffd600; color:#333; cursor:pointer; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,0.07); margin-bottom:1em;">Pause</button>
				<button id="restart-btn" style="padding:0.7em 1.5em; font-size:1.1em; border:none; border-radius:8px; background:#00bcd4; color:#fff; cursor:pointer; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,0.07);">Restart</button>
				<!-- Challenge button removed for difficulty modes -->
				<div id="edu-popup" style="margin-top:2em; min-height:48px; max-width:220px; color:#1565c0; background:#e0f7fa; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.07); padding:0.7em 1em; font-size:1em; text-align:left; display:none;"></div>
			</div>
			<div id="side-left">
				<div id="top-bar">
					<div id="score">Score: 0</div>
					<div id="village-health">
						<span id="health-label">Village Health:</span>
						<div id="health-bar"><div id="health-fill"></div></div>
					</div>
				</div>
				<div id="message" style="font-size:1.1em; margin-bottom:0.5em; color:#1565c0;">Let clean water through. Stop contaminants.</div>
				<div class="game-logo-row">
					<img src="logo.png" alt="charity: water logo" class="cw-logo">
					<div id="game-area" style="position:relative;">
						<canvas id="game-canvas" width="400" height="600"></canvas>
						<!-- The green bar and cannon are drawn in the canvas -->
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- End Screen -->
	<div id="end-screen" class="overlay" style="display:none;">
		<h2 id="end-title"></h2>
		<div id="final-score"></div>
		<div id="water-protected"></div>
		<div id="edu-message"></div>
		<button id="play-again-btn">Play Again</button>
		<p class="learn-more">Learn more at <a href="https://charitywater.org" target="_blank">charitywater.org</a></p>
	</div>

	<script src="script.js"></script>
</body>
</html>
